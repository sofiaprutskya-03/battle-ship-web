<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Морський бій</title>
    <link href="https://cdn.webdatarocks.com/latest/webdatarocks.min.css" rel="stylesheet"/>
    <script src="https://cdn.webdatarocks.com/latest/webdatarocks.js"></script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="game.js" defer></script>
</head>
<body>
    <h1>Морський бій</h1>
    <div class="game-container">
        <div class="boards">
            <div id="userBoard"></div>
            <div id="enemyBoard"></div>
        </div>
        <div class="sidebar">
            <div class="scoreboard">
                <h3>Інформація</h3>
                <p>Залишилось поставити: <b id="cellsLeft">20</b> палуб</p>
                <small>*Палуби не можуть торкатися по діагоналі</small>
            </div>
            <p id="turnInfo">Розставте кораблі і натисніть Старт</p>
            <button id="startBtn" disabled>Старт</button>
        </div>
    </div>
</body>
</html>
